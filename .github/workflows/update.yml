name: Update Tour Data

on:
  schedule:
    - cron: "0 6 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run script
        run: node update.js

      - name: Commit & Push
        run: |
          git config user.name "bot"
          git config user.email "bot@mail.com"
          git add .
          git commit -m "daily update" || echo "no changes"
          git push
